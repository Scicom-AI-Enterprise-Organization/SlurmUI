apiVersion: 1

datasources:
  - name: Prometheus
    uid: slurmui-prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      httpMethod: POST
      timeInterval: 15s

  - name: Loki
    uid: slurmui-loki
    type: loki
    access: proxy
    url: http://loki:3100
    jsonData:
      # Click a log line's requestId/trace to pivot — wired to the
      # requestId field emitted by the app.
      maxLines: 1000
