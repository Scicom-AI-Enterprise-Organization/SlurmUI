global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # SlurmUI web app — business gauges + API-layer RED metrics
  # (slurmui_http_requests_total / slurmui_http_request_duration_seconds)
  # plus Node runtime metrics, all served from /api/metrics.
  - job_name: slurmui
    metrics_path: /api/metrics
    # If the web app sets METRICS_TOKEN, write that token to
    # monitoring/prometheus/metrics_token (gitignored) and uncomment the
    # block below. Prometheus does not expand env vars in its config, so a
    # file is the clean way to inject the secret. Leave commented for the
    # common case where /api/metrics is unauthenticated.
    # authorization:
    #   type: Bearer
    #   credentials_file: /etc/prometheus/metrics_token
    static_configs:
      - targets: ["host.docker.internal:3000"]
        labels:
          instance: slurmui-web

  # Prometheus self-monitoring.
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
