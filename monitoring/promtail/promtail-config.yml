# Promtail tails the SlurmUI web container's stdout (Docker json-file logs)
# and ships to Loki. It uses Docker service discovery to find the web
# container by name, then parses the pino JSON access logs so fields like
# status / route / durationMs become queryable in Grafana via LogQL:
#
#   {service="slurmui"} | json | status >= 500
#   {service="slurmui"} | json | durationMs > 1000
#   {service="slurmui", route="/api/clusters/:id/jobs"} | json
server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: slurmui-web
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
    relabel_configs:
      # Only the SlurmUI web container. The prod compose names it
      # *-web-* / scicom-aura-web; match "web" in the container name.
      - source_labels: ["__meta_docker_container_name"]
        regex: ".*(web|slurmui).*"
        action: keep
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container"
      - target_label: "service"
        replacement: "slurmui"
    pipeline_stages:
      # Docker json-file wrapper: {"log":"...","stream":"...","time":"..."}
      - docker: {}
      # Parse the pino JSON line. Non-JSON lines (plain console.log noise)
      # fall through unchanged — json stage is lenient on parse failure.
      - json:
          expressions:
            level: level
            kind: kind
            status: status
            statusClass: statusClass
            route: route
            method: method
            durationMs: durationMs
            requestId: requestId
            msg: msg
      # Promote a few low-cardinality fields to labels for fast filtering.
      # NOTE: status/route stay as parsed fields (high cardinality) — query
      # them with `| json` rather than as labels.
      - labels:
          statusClass:
          method:
          kind:
      # pino emits epoch-millis in `time` by default. Re-parse it so the
      # json stage can read it (it was not in the expressions above).
      - json:
          expressions:
            time: time
      - timestamp:
          source: time
          format: UnixMs
