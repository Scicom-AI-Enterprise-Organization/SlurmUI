# SlurmUI API-layer observability stack: Prometheus (RED metrics) + Loki
# (request logs) + Promtail (log shipper) + Grafana (dashboard).
#
# Self-contained — it does NOT depend on any cluster's Grafana. It scrapes the
# SlurmUI web app's /api/metrics and tails the web container's stdout logs.
#
#   docker compose -f monitoring/docker-compose.monitoring.yml up -d
#
# The web app runs with network_mode: host (see docker-compose.prod.yml), so
# from inside these bridged containers we reach it at host.docker.internal:3000
# via the host-gateway alias below.
#
# Grafana:    http://localhost:3001  (admin / admin on first boot — change it)
# Prometheus: http://localhost:9091
#
# If METRICS_TOKEN is set on the web app, also set it here so Prometheus can
# authenticate:  METRICS_TOKEN=... docker compose -f ... up -d

services:
  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    ports:
      - "9091:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      METRICS_TOKEN: ${METRICS_TOKEN:-}
    networks: [monitoring]

  loki:
    image: grafana/loki:3.2.1
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - lokidata:/loki
    networks: [monitoring]

  promtail:
    image: grafana/promtail:3.2.1
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      # Read Docker's json-file logs to tail the web container's stdout.
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtailpos:/promtail
    depends_on: [loki]
    networks: [monitoring]

  grafana:
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    depends_on: [prometheus, loki]
    networks: [monitoring]

networks:
  monitoring:
    driver: bridge

volumes:
  promdata:
  lokidata:
  promtailpos:
  grafanadata:
