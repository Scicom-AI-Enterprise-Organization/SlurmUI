---
# Add a new worker container to an existing container-mode cluster.
#
# Usage:
#   ansible-playbook -i inventory/hosts.ini \
#     -e @cluster-config.json \
#     -e is_container_cluster=true \
#     -e target_node=worker-3 \
#     add_node_container.yml

- name: Update hosts block on every existing cluster node
  hosts: slurm
  become: true
  vars:
    is_container_cluster: true
  roles:
    - hosts_block

# Re-render slurm.conf on the controller first so it includes the new node,
# then stage it locally for distribution to the new worker (and all the
# existing ones — see propagate task at the end).
- name: Refresh controller slurm.conf with the new node and stage it
  hosts: slurm_controllers
  become: true
  vars:
    is_container_cluster: true
  tasks:
    - name: Re-render slurm.conf
      ansible.builtin.template:
        src: roles/slurm_controller/templates/slurm.conf.j2
        dest: "{{ slurm_config_dir }}/slurm.conf"
        owner: "{{ slurm_user }}"
        group: "{{ slurm_group }}"
        mode: '0644'
    - name: Stage munge.key for new worker
      ansible.builtin.fetch:
        src: /etc/munge/munge.key
        dest: "/tmp/aura-stage/{{ slurm_cluster_name }}/munge.key"
        flat: true
    - name: Stage slurm.conf for new worker
      ansible.builtin.fetch:
        src: "{{ slurm_config_dir }}/slurm.conf"
        dest: "/tmp/aura-stage/{{ slurm_cluster_name }}/slurm.conf"
        flat: true
    - name: Stage cgroup.conf for new worker
      ansible.builtin.fetch:
        src: "{{ slurm_config_dir }}/cgroup.conf"
        dest: "/tmp/aura-stage/{{ slurm_cluster_name }}/cgroup.conf"
        flat: true
    - name: Stage gres.conf for new worker (when present)
      ansible.builtin.fetch:
        src: "{{ slurm_config_dir }}/gres.conf"
        dest: "/tmp/aura-stage/{{ slurm_cluster_name }}/gres.conf"
        flat: true
      ignore_errors: true

- name: Onboard new worker container
  hosts: "{{ target_node }}"
  become: true
  vars:
    is_container_cluster: true
  pre_tasks:
    - name: Ensure /etc/munge exists
      ansible.builtin.file:
        path: /etc/munge
        state: directory
        owner: "{{ munge_user }}"
        group: "{{ munge_group }}"
        mode: '0711'
    - name: Push munge.key to new worker
      ansible.builtin.copy:
        src: "/tmp/aura-stage/{{ slurm_cluster_name }}/munge.key"
        dest: /etc/munge/munge.key
        owner: "{{ munge_user }}"
        group: "{{ munge_group }}"
        mode: '0400'
    - name: Ensure /etc/slurm exists
      ansible.builtin.file:
        path: "{{ slurm_config_dir }}"
        state: directory
        owner: "{{ slurm_user }}"
        group: "{{ slurm_group }}"
        mode: '0755'
    - name: Push slurm.conf to new worker
      ansible.builtin.copy:
        src: "/tmp/aura-stage/{{ slurm_cluster_name }}/slurm.conf"
        dest: "{{ slurm_config_dir }}/slurm.conf"
        owner: "{{ slurm_user }}"
        group: "{{ slurm_group }}"
        mode: '0644'
    - name: Push cgroup.conf to new worker
      ansible.builtin.copy:
        src: "/tmp/aura-stage/{{ slurm_cluster_name }}/cgroup.conf"
        dest: "{{ slurm_config_dir }}/cgroup.conf"
        owner: "{{ slurm_user }}"
        group: "{{ slurm_group }}"
        mode: '0644'
    - name: Push gres.conf to new worker (when present)
      ansible.builtin.copy:
        src: "/tmp/aura-stage/{{ slurm_cluster_name }}/gres.conf"
        dest: "{{ slurm_config_dir }}/gres.conf"
        owner: "{{ slurm_user }}"
        group: "{{ slurm_group }}"
        mode: '0644'
      ignore_errors: true
  roles:
    - common
    - supervisord
    - nfs_client_container
    - hosts_block
    - munge_container
    - slurm_worker_container
  post_tasks:
    - name: Reload supervisord conf so slurmd / munged actually start
      ansible.builtin.shell: |
        supervisorctl reread
        supervisorctl update
      changed_when: false

# Also propagate the refreshed slurm.conf to every existing worker so
# the new node is recognised cluster-wide. The controller already has it.
- name: Push refreshed slurm.conf to every existing worker
  hosts: slurm_workers
  become: true
  vars:
    is_container_cluster: true
  tasks:
    - name: Push slurm.conf
      ansible.builtin.copy:
        src: "/tmp/aura-stage/{{ slurm_cluster_name }}/slurm.conf"
        dest: "{{ slurm_config_dir }}/slurm.conf"
        owner: "{{ slurm_user }}"
        group: "{{ slurm_group }}"
        mode: '0644'
      notify: restart slurmd
  handlers:
    - name: restart slurmd
      ansible.builtin.command: supervisorctl restart slurmd
      changed_when: true

- name: Reconfigure controller to pick up the new node
  hosts: slurm_controllers
  become: true
  tasks:
    - name: scontrol reconfigure
      ansible.builtin.command: scontrol reconfigure
      changed_when: true
    - name: Restart slurmctld (covers config changes scontrol cannot handle live)
      ansible.builtin.command: supervisorctl restart slurmctld
      changed_when: true
  post_tasks:
    - name: Confirm new node visible in sinfo
      ansible.builtin.command: sinfo -N -n {{ target_node }} --noheader --format="%T"
      register: node_state
      changed_when: false
      retries: 6
      delay: 5
      until: node_state.stdout | trim in ['idle', 'idle~', 'down', 'allocated', 'future']
      failed_when: node_state.stdout | trim == ''
    - name: Print node state
      ansible.builtin.debug:
        msg: "Node {{ target_node }} state: {{ node_state.stdout | trim }}"
