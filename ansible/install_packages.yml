---
- name: Install packages on all cluster nodes
  hosts: all
  become: true
  gather_facts: false

  vars:
    packages: []  # list passed via --extra-vars

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install requested packages
      ansible.builtin.apt:
        name: "{{ packages }}"
        state: present
