---
- name: Configure NFS mounts on master
  hosts: localhost
  connection: local
  become: true
  tasks:
    - name: Install nfs-common
      apt:
        name: nfs-common
        state: present
        update_cache: true

    - name: Create mgmt mount point
      file:
        path: "{{ mgmt_nfs_path }}"
        state: directory
        mode: "0755"

    - name: Create data mount point
      file:
        path: "{{ data_nfs_path }}"
        state: directory
        mode: "0755"

    - name: Mount mgmt NFS
      mount:
        path: "{{ mgmt_nfs_path }}"
        src: "{{ mgmt_nfs_server }}:{{ mgmt_nfs_path }}"
        fstype: nfs
        opts: defaults,noatime
        state: mounted

    - name: Mount data NFS
      mount:
        path: "{{ data_nfs_path }}"
        src: "{{ data_nfs_server }}:{{ data_nfs_path }}"
        fstype: nfs
        opts: defaults,noatime
        state: mounted
