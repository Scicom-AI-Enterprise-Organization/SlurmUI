---
- name: Write /etc/hosts and configure Slurm nodes on master
  hosts: slurm_controllers
  become: true
  tasks:
    - name: Add cluster nodes to /etc/hosts
      blockinfile:
        path: /etc/hosts
        block: |
          {% for node in nodes %}
          {{ node.ip }} {{ node.hostname }}
          {% endfor %}
        marker: "# {mark} AURA CLUSTER NODES"

    - name: Install Slurm controller packages
      apt:
        name:
          - slurm-wlm
          - slurmctld
        state: present
        update_cache: true

    - name: Write Slurm node definitions
      template:
        src: slurm_nodes.conf.j2
        dest: /etc/slurm/nodes.conf
        owner: slurm
        group: slurm
        mode: "0644"

    - name: Ensure nodes.conf is included in slurm.conf
      lineinfile:
        path: /etc/slurm/slurm.conf
        line: "Include /etc/slurm/nodes.conf"
        state: present
        create: true

- name: Install Slurm compute daemon on workers
  hosts: slurm_workers
  become: true
  tasks:
    - name: Add cluster nodes to /etc/hosts on workers
      blockinfile:
        path: /etc/hosts
        block: |
          {% for node in nodes %}
          {{ node.ip }} {{ node.hostname }}
          {% endfor %}
        marker: "# {mark} AURA CLUSTER NODES"

    - name: Install slurmd and nfs-common on workers
      apt:
        name:
          - slurmd
          - nfs-common
        state: present
        update_cache: true

    - name: Create mgmt mount point on workers
      file:
        path: "{{ mgmt_nfs_path }}"
        state: directory
        mode: "0755"
      when: mgmt_nfs_path | default('') != ''

    - name: Create data mount point on workers
      file:
        path: "{{ data_nfs_path }}"
        state: directory
        mode: "0755"
      when: data_nfs_path | default('') != ''

    - name: Mount mgmt NFS on workers
      ansible.posix.mount:
        path: "{{ mgmt_nfs_path }}"
        src: "{{ mgmt_nfs_server }}:{{ mgmt_nfs_path }}"
        fstype: nfs
        opts: defaults,noatime
        state: mounted
      # Skip if this host IS the NFS server (would deadlock).
      when:
        - mgmt_nfs_server | default('') != ''
        - mgmt_nfs_path | default('') != ''
        - ansible_host != mgmt_nfs_server

    - name: Mount data NFS on workers
      ansible.posix.mount:
        path: "{{ data_nfs_path }}"
        src: "{{ data_nfs_server }}:{{ data_nfs_path }}"
        fstype: nfs
        opts: defaults,noatime
        state: mounted
      # Skip if this host IS the NFS server (would deadlock).
      when:
        - data_nfs_server | default('') != ''
        - data_nfs_path | default('') != ''
        - ansible_host != data_nfs_server
