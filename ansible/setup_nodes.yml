---
- name: Configure Slurm controller on master
  hosts: slurm_controllers
  become: true
  tasks:
    - name: Add cluster nodes to /etc/hosts
      blockinfile:
        path: /etc/hosts
        block: |
          {% for node in nodes %}
          {{ node.ip }} {{ node.hostname }}
          {% endfor %}
        marker: "# {mark} AURA CLUSTER NODES"

    - name: Install Slurm controller packages
      apt:
        name:
          - slurmctld
          - slurm-client
          - munge
        state: present
        update_cache: true

    - name: Stop and disable slurmd on controller (not a worker node)
      service:
        name: slurmd
        state: stopped
        enabled: false
      when: not controller_is_worker
      ignore_errors: true

    - name: Create Slurm runtime directories
      file:
        path: "{{ item }}"
        state: directory
        owner: slurm
        group: slurm
        mode: "0755"
      loop:
        - /var/lib/slurm/slurmctld
        - /var/lib/slurm/slurmd
        - /var/log/slurm
        - /var/run/slurm
        - /etc/slurm

    - name: Write slurm.conf (only if ClusterName not already present)
      template:
        src: slurm-base.conf.j2
        dest: /etc/slurm/slurm.conf
        owner: slurm
        group: slurm
        mode: "0644"
        force: no

    - name: Write Slurm node definitions
      template:
        src: slurm_nodes.conf.j2
        dest: /etc/slurm/nodes.conf
        owner: slurm
        group: slurm
        mode: "0644"

    - name: Ensure partitions.conf exists (written later by setup_partitions)
      file:
        path: /etc/slurm/partitions.conf
        state: touch
        owner: slurm
        group: slurm
        mode: "0644"
        modification_time: preserve
        access_time: preserve

    - name: Generate munge key if not present
      command: mungekey --create --keyfile=/etc/munge/munge.key
      args:
        creates: /etc/munge/munge.key

    - name: Set munge key permissions
      file:
        path: /etc/munge/munge.key
        owner: munge
        group: munge
        mode: "0400"

    - name: Enable and start munge
      service:
        name: munge
        state: started
        enabled: true

    - name: Enable and start slurmctld
      service:
        name: slurmctld
        state: started
        enabled: true

- name: Install Slurm compute daemon on workers
  hosts: slurm_workers
  become: true
  tasks:
    - name: Add cluster nodes to /etc/hosts on workers
      blockinfile:
        path: /etc/hosts
        block: |
          {{ hostvars['localhost']['ansible_default_ipv4']['address'] }} {{ controller_hostname }}
          {% for node in nodes %}
          {% if node.hostname != controller_hostname %}
          {{ node.ip }} {{ node.hostname }}
          {% endif %}
          {% endfor %}
        marker: "# {mark} AURA CLUSTER NODES"

    - name: Install slurmd and nfs-common on workers
      apt:
        name:
          - slurmd
          - nfs-common
          - munge
        state: present
        update_cache: true

    - name: Create Slurm runtime directories on workers
      file:
        path: "{{ item }}"
        state: directory
        owner: slurm
        group: slurm
        mode: "0755"
      loop:
        - /var/lib/slurm/slurmd
        - /var/log/slurm
        - /var/run/slurm
        - /etc/slurm

    - name: Deploy munge key on workers
      copy:
        src: /etc/munge/munge.key
        dest: /etc/munge/munge.key
        owner: munge
        group: munge
        mode: "0400"

    - name: Restart munge on workers to load new key
      service:
        name: munge
        state: restarted
        enabled: true

    - name: Create mgmt mount point on workers
      file:
        path: "{{ mgmt_nfs_path }}"
        state: directory
        mode: "0755"
      when: mgmt_nfs_path | default('') != ''

    - name: Create data mount point on workers
      file:
        path: "{{ data_nfs_path }}"
        state: directory
        mode: "0755"
      when: data_nfs_path | default('') != ''

    - name: Mount mgmt NFS on workers
      ansible.posix.mount:
        path: "{{ mgmt_nfs_path }}"
        src: "{{ mgmt_nfs_server }}:{{ mgmt_nfs_path }}"
        fstype: nfs
        opts: soft,timeo=30,retrans=3,noatime
        state: mounted
      when:
        - mgmt_nfs_server | default('') != ''
        - mgmt_nfs_path | default('') != ''
        - ansible_host != mgmt_nfs_server

    - name: Mount data NFS on workers
      ansible.posix.mount:
        path: "{{ data_nfs_path }}"
        src: "{{ data_nfs_server }}:{{ data_nfs_path }}"
        fstype: nfs
        opts: soft,timeo=30,retrans=3,noatime
        state: mounted
      when:
        - data_nfs_server | default('') != ''
        - data_nfs_path | default('') != ''
        - ansible_host != data_nfs_server

    - name: Copy slurm.conf from controller to workers
      copy:
        src: /etc/slurm/slurm.conf
        dest: /etc/slurm/slurm.conf
        owner: slurm
        group: slurm
        mode: "0644"

    - name: Copy nodes.conf from controller to workers
      copy:
        src: /etc/slurm/nodes.conf
        dest: /etc/slurm/nodes.conf
        owner: slurm
        group: slurm
        mode: "0644"

    - name: Ensure partitions.conf exists on workers
      file:
        path: /etc/slurm/partitions.conf
        state: touch
        owner: slurm
        group: slurm
        mode: "0644"
        modification_time: preserve
        access_time: preserve

    - name: Enable and start slurmd on workers
      service:
        name: slurmd
        state: started
        enabled: true

- name: Rewrite nodes.conf with actual hardware specs detected from workers
  hosts: slurm_controllers
  become: true
  tasks:
    - name: Write nodes.conf using real CPU/memory from worker Ansible facts
      copy:
        dest: /etc/slurm/nodes.conf
        owner: slurm
        group: slurm
        mode: "0644"
        content: |
          {% for host in groups['slurm_workers'] %}
          {% set ns = namespace(gpus=0) %}
          {% for node in nodes %}{% if node.hostname == host %}{% set ns.gpus = node.gpus | int %}{% endif %}{% endfor %}
          NodeName={{ host }} CPUs={{ hostvars[host]['ansible_processor_vcpus'] | int }} Sockets={{ hostvars[host]['ansible_processor_count'] | int }} CoresPerSocket={{ hostvars[host]['ansible_processor_cores'] | int }} ThreadsPerCore={{ (hostvars[host]['ansible_processor_vcpus'] | int // (hostvars[host]['ansible_processor_count'] | int * hostvars[host]['ansible_processor_cores'] | int)) | int }} RealMemory={{ hostvars[host]['ansible_memtotal_mb'] | int - 512 }}{% if ns.gpus > 0 %} Gres=gpu:{{ ns.gpus }}{% endif %} State=UNKNOWN
          {% endfor %}

    - name: Restart slurmctld to load updated node specs
      service:
        name: slurmctld
        state: restarted

- name: Sync updated Slurm config to workers and restart slurmd
  hosts: slurm_workers
  become: true
  tasks:
    - name: Sync slurm.conf to workers
      copy:
        src: /etc/slurm/slurm.conf
        dest: /etc/slurm/slurm.conf
        owner: slurm
        group: slurm
        mode: "0644"

    - name: Sync auto-detected nodes.conf to workers
      copy:
        src: /etc/slurm/nodes.conf
        dest: /etc/slurm/nodes.conf
        owner: slurm
        group: slurm
        mode: "0644"

    - name: Restart slurmd to load updated config
      service:
        name: slurmd
        state: restarted
