# ----------------------------------------------------------------------------
# Reusable "start/restart a service" task file.
#
# Branches on the `node_supervisor` host fact (set by roles/common):
#   - systemd → ansible.builtin.service (existing behaviour)
#   - pm2     → dunstorm/pm2-go CLI driven via /usr/local/bin/pm2
#
# Inputs (vars):
#   svc_name      (required) — short name, e.g. "slurmd", "munge"
#   svc_cmd       (required) — full command line; first word is the
#                              executable, remaining words become its args.
#                              e.g. "/usr/sbin/slurmd -D -f /etc/slurm/slurm.conf"
#   svc_state     (optional) — "started" (default), "restarted", "stopped"
#   svc_enabled   (optional) — true (default) | false. systemd-only signal.
#   svc_user      (optional) — drop privileges to this unix user (systemd
#                              uses unit-file User=; pm2-go v0.1.2 does not
#                              expose a `user` field in its JSON schema and
#                              ignores this on the pm2 branch).
#
# pm2-go schema reference: github.com/dunstorm/pm2-go (v0.1.2)
#   - JSON file is a flat array: [{...}, ...]
#   - Fields: name, executable_path, args (array), autorestart, cwd,
#             scripts, cron_restart
#   - `pm2 start <json>` is idempotent: if the named process exists it
#     restarts it with the new params (see app/file.go::StartFile).
#   - State files live at $HOME/.pm2-go/{pids,logs}/.
# ----------------------------------------------------------------------------

- name: "Sanity: svc_name/svc_cmd present"
  ansible.builtin.assert:
    that:
      - svc_name is defined
      - svc_name | length > 0
      - svc_cmd is defined
      - svc_cmd | length > 0
    fail_msg: "_supervisor.yml: svc_name and svc_cmd are both required."

# --- systemd branch -----------------------------------------------------------
- name: "[{{ svc_name }}] systemd: state={{ svc_state | default('started') }}"
  ansible.builtin.service:
    name: "{{ svc_name }}"
    state: "{{ svc_state | default('started') }}"
    enabled: "{{ svc_enabled | default(true) }}"
  when: node_supervisor == "systemd"

# --- pm2-go branch ------------------------------------------------------------
# We write the ecosystem JSON unconditionally so a later state transition
# (e.g. svc_state=stopped) doesn't need a different code path; the JSON
# itself is the source of truth and `pm2 start <json>` is idempotent.
- name: "[{{ svc_name }}] pm2: ensure config dir"
  ansible.builtin.file:
    path: /etc/aura/pm2
    state: directory
    mode: '0755'
  when: node_supervisor == "pm2"

- name: "[{{ svc_name }}] pm2: write service config"
  ansible.builtin.copy:
    dest: "/etc/aura/pm2/{{ svc_name }}.json"
    mode: '0644'
    # Flat JSON array per pm2-go v0.1.2's StartFile parser
    # (app/file.go). Using `to_nice_json` here so args land as a real
    # JSON array rather than a stringified one. Everything pm2-go ignores
    # at this version (max_restarts, restart_delay, out_file, …) is
    # omitted to keep the file lean and matching the upstream schema.
    content: "{{ [pm2_app] | to_nice_json }}\n"
  vars:
    pm2_app:
      name: "{{ svc_name }}"
      executable_path: "{{ svc_cmd.split() | first }}"
      args: "{{ svc_cmd.split()[1:] }}"
      cwd: "/"
      autorestart: true
  when: node_supervisor == "pm2"
  register: _aura_pm2_config

# pm2-go writes per-service state under $HOME/.pm2-go (== /root/.pm2-go
# when running under sudo). `pm2 start <json>` auto-spawns the daemon,
# then for each entry: if a process with that name already exists, stops
# and restarts it with the new params; else spawns it from scratch.
# `setsid` detaches pm2 from ansible's SSH process group, so when the
# SSH connection closes at the end of the task the SIGHUP that follows
# the controlling tty doesn't kill the pm2 daemon (and the daemons it
# supervises). Without this every bootstrap leaves the cluster with no
# running services because `pm2 start` returned 0 but the children got
# killed milliseconds later. `--wait` keeps ansible blocking until the
# setsid'd child finishes its initial registration with the pm2 daemon
# so we don't race the next task.
#
# Before the start: pm2-go has an observed wrapper/child PID drift bug
# where `pm2 start <json>` on an already-running entry silently no-ops
# instead of restarting it, leaving the OLD binary running with the old
# config. We've hit this on grafana (stale root_url after re-deploy) and
# the same shape is plausible on every slurm service. Force-stop + SIGKILL
# by binary basename before `pm2 start` so the next launch is always a
# real launch — never a phantom one. First-run hosts have nothing to kill,
# so the kill is a no-op and adds no latency.
# Split the hard-stop into three discrete `command:` tasks rather than one
# `shell:` block-scalar. ansible's pre-jinja argument splitter chokes on
# multi-line `shell:` blocks containing both jinja braces and `||`/pipes:
# even with a `|` block-scalar it tries to lex the joined script as a single
# command line and fails with "failed at splitting arguments, either an
# unbalanced jinja2 block or quotes". `command:` skips the shell parser, so
# we use it three times in a row and ignore non-zero exit (best-effort).
- name: "[{{ svc_name }}] pm2: derive binary basename"
  ansible.builtin.set_fact:
    _aura_pm2_bin: "{{ svc_cmd.split() | first | basename }}"
  when:
    - node_supervisor == "pm2"
    - svc_state | default('started') in ['started', 'restarted', 'stopped']

- name: "[{{ svc_name }}] pm2: stop (pre-restart, best-effort)"
  ansible.builtin.command: /usr/local/bin/pm2 stop {{ svc_name }}
  when:
    - node_supervisor == "pm2"
    - svc_state | default('started') in ['started', 'restarted']
  failed_when: false
  changed_when: false

- name: "[{{ svc_name }}] pm2: SIGKILL stale binary (executable basename)"
  ansible.builtin.command: pkill -9 -x {{ _aura_pm2_bin }}
  when:
    - node_supervisor == "pm2"
    - svc_state | default('started') in ['started', 'restarted']
  failed_when: false
  changed_when: false

# munge's pm2 entry execs runuser→munged so the basename above is `runuser`,
# which is gone by the time pkill runs. Always also pkill munged so the
# stale daemon is killed regardless of which service we're restarting.
- name: "[{{ svc_name }}] pm2: SIGKILL stale munged (for munge service)"
  ansible.builtin.command: pkill -9 -x munged
  when:
    - node_supervisor == "pm2"
    - svc_state | default('started') in ['started', 'restarted']
  failed_when: false
  changed_when: false

- name: "[{{ svc_name }}] pm2: start (idempotent)"
  ansible.builtin.command: >-
    setsid --wait /usr/local/bin/pm2 start /etc/aura/pm2/{{ svc_name }}.json
  when:
    - node_supervisor == "pm2"
    - svc_state | default('started') in ['started', 'restarted']
  changed_when: true

# Same three-step pattern as the hard-stop above, for an explicit
# svc_state=stopped transition. See comment block on the restart path
# explaining why these are `command:` rather than `shell:`.
- name: "[{{ svc_name }}] pm2: stop (explicit)"
  ansible.builtin.command: /usr/local/bin/pm2 stop {{ svc_name }}
  when:
    - node_supervisor == "pm2"
    - svc_state | default('started') == 'stopped'
  failed_when: false
  changed_when: true

- name: "[{{ svc_name }}] pm2: SIGKILL stale binary on stop"
  ansible.builtin.command: pkill -9 -x {{ _aura_pm2_bin }}
  when:
    - node_supervisor == "pm2"
    - svc_state | default('started') == 'stopped'
  failed_when: false
  changed_when: false

- name: "[{{ svc_name }}] pm2: SIGKILL stale munged on stop"
  ansible.builtin.command: pkill -9 -x munged
  when:
    - node_supervisor == "pm2"
    - svc_state | default('started') == 'stopped'
  failed_when: false
  changed_when: false

# Persist the current process list so a container restart can re-run
# `pm2 restore` (manual or via the container entrypoint) and bring the
# fleet back online without ansible.
- name: "[{{ svc_name }}] pm2: dump state"
  # setsid same reason as above — pm2 dump spawns the daemon if it's not
  # already running, and if the daemon is parent-ed to ansible's SSH
  # session the SIGHUP at task close kills it.
  ansible.builtin.command: setsid --wait /usr/local/bin/pm2 dump
  when: node_supervisor == "pm2"
  changed_when: true
