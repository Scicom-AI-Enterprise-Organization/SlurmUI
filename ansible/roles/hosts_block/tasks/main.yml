---
- name: Build hosts block content
  ansible.builtin.set_fact:
    hosts_block_content: "{% for entry in slurm_hosts_entries %}{{ entry.ip }} {{ entry.hostname }}\n{% endfor %}"

- name: Manage slurm hosts block in /etc/hosts
  ansible.builtin.blockinfile:
    path: /etc/hosts
    marker: "#### {mark} slurm hosts ####"
    marker_begin: "start"
    marker_end: "end"
    block: "{{ hosts_block_content }}"
    create: false
    # Write atomically into /etc/hosts BY VALUE rather than the default
    # tmp-rename-replace dance. Containers usually bind-mount /etc/hosts
    # from the host so the inode can't be renamed over (EBUSY: "Device
    # or resource busy"). `unsafe_writes` falls back to a truncate+write
    # in place which works with bind mounts.
    unsafe_writes: true
