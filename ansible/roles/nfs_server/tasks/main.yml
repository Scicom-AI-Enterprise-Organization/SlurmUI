---
- name: Install NFS server
  ansible.builtin.apt:
    name: nfs-kernel-server
    state: present
    update_cache: true

- name: Create mgmt directory
  ansible.builtin.file:
    path: "{{ mgmt_nfs_path }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Create data directory
  ansible.builtin.file:
    path: "{{ data_nfs_path }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Write NFS exports
  ansible.builtin.template:
    src: exports.j2
    dest: /etc/exports
    owner: root
    group: root
    mode: '0644'
  register: _aura_exports

- name: Enable and start NFS server
  ansible.builtin.service:
    name: nfs-kernel-server
    state: started
    enabled: true

# Re-export immediately (not via handler). Handlers flush at end-of-play, but
# the worker play starts the NFS-client mount before then — so we'd race and
# clients would hit "access denied by server" against the in-memory table
# nfsd still had from the last run.
- name: Re-export NFS shares now
  ansible.builtin.command: exportfs -ra
  changed_when: true

- name: Restart NFS server to pick up new exports
  ansible.builtin.service:
    name: nfs-kernel-server
    state: restarted
  when: _aura_exports.changed
