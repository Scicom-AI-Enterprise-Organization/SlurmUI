---
- name: Remove loopback alias for hostname (Ubuntu installer artifact)
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1\s'
    state: absent

- name: Create munge group
  ansible.builtin.group:
    name: "{{ munge_group }}"
    gid: "{{ munge_gid }}"
    state: present

- name: Create slurm group
  ansible.builtin.group:
    name: "{{ slurm_group }}"
    gid: "{{ slurm_gid }}"
    state: present

- name: Create munge user
  ansible.builtin.user:
    name: "{{ munge_user }}"
    uid: "{{ munge_uid }}"
    group: "{{ munge_group }}"
    system: true
    shell: /sbin/nologin
    create_home: false
    state: present

- name: Create slurm user
  ansible.builtin.user:
    name: "{{ slurm_user }}"
    uid: "{{ slurm_uid }}"
    group: "{{ slurm_group }}"
    system: true
    shell: /sbin/nologin
    create_home: false
    state: present

- name: Install base packages
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - vim
      - python3
      - python3-pip
      - python3-venv
      - slurm-client
      # `acl` lets Ansible hand temp-file ownership to an unprivileged
      # become_user via setfacl; without it, Ansible falls back to NFSv4
      # chmod syntax that plain Linux chmod rejects (the "A+user:munge:rx:allow"
      # error you saw on the Generate munge key task).
      - acl
    state: present
    update_cache: true

