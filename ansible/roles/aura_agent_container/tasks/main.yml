---
# Container-mode aura-agent: same Go binary, same env vars, just supervisord
# instead of systemd. Skips the /etc/aura-agent/agent.env file since
# supervisord embeds env inline in the program conf.

- name: Create aura-agent config directory
  ansible.builtin.file:
    path: /etc/aura-agent
    state: directory
    owner: root
    group: root
    mode: '0750'

- name: Copy Aura Agent binary
  ansible.builtin.copy:
    src: "{{ aura_agent_binary_src }}"
    dest: /usr/local/bin/aura-agent
    owner: root
    group: root
    mode: '0755'
  notify: restart aura-agent

- name: Copy ansible playbooks to node
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/"
    dest: "{{ aura_agent_playbook_dir | default('/opt/aura/ansible') }}/"
    owner: root
    group: root
    mode: '0644'
    directory_mode: '0755'

- name: Drop supervisord program conf for aura-agent
  ansible.builtin.template:
    src: aura-agent.conf.j2
    dest: "{{ supervisord_conf_d }}/aura-agent.conf"
    owner: root
    group: root
    mode: '0644'
  notify:
    - reload supervisord conf
    - restart aura-agent
