---
- name: Install SSSD and IPA client packages
  ansible.builtin.apt:
    name:
      - sssd
      - sssd-ipa
      - sssd-tools
      - libsss-idmap0
    state: present
    update_cache: true

- name: Write sssd.conf
  ansible.builtin.template:
    src: sssd.conf.j2
    dest: /etc/sssd/sssd.conf
    owner: root
    group: root
    mode: '0600'
  notify: restart sssd

- name: Start sssd
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/_supervisor.yml"
  vars:
    svc_name: sssd
    # --interactive keeps sssd in the foreground (equivalent of systemd's
    # Type=notify wait). Without it pm2 sees the daemon fork and treats
    # the parent exit as a crash.
    svc_cmd: "/usr/sbin/sssd --interactive --logger=stderr"
    svc_state: started

- name: Enable mkhomedir in PAM
  ansible.builtin.command: pam-auth-update --enable mkhomedir
  changed_when: false
