---
- name: Install chrony
  ansible.builtin.apt:
    name: chrony
    state: present
    update_cache: true

- name: Write chrony config
  ansible.builtin.template:
    src: chrony.conf.j2
    dest: /etc/chrony/chrony.conf
    owner: root
    group: root
    mode: '0644'
  notify: restart chrony

# chronyd in a container is usually a no-op (host owns the clock), but
# routing through the supervisor helper keeps the role consistent and
# survives containerised compute. -d keeps chronyd in the foreground for
# pm2 supervision; systemd ignores it.
- name: Start chronyd
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/_supervisor.yml"
  vars:
    svc_name: chrony
    svc_cmd: "/usr/sbin/chronyd -d"
    svc_state: started
