---
- name: Install slurmd
  ansible.builtin.apt:
    name:
      - slurmd
      - slurm-client
    state: present
    update_cache: true

- name: Create slurm directories on worker
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ slurm_user }}"
    group: "{{ slurm_group }}"
    mode: '0755'
  loop:
    - "{{ slurm_config_dir }}"
    - "{{ slurm_log_dir }}"
    - "{{ slurm_spool_dir }}/slurmd"

- name: Copy slurm.conf from mgmt FS
  ansible.builtin.copy:
    src: "{{ mgmt_nfs_path }}/slurm.conf"
    dest: "{{ slurm_config_dir }}/slurm.conf"
    owner: "{{ slurm_user }}"
    group: "{{ slurm_group }}"
    mode: '0644'
    remote_src: true
  notify: restart slurmd

- name: Copy cgroup.conf from mgmt FS
  ansible.builtin.copy:
    src: "{{ mgmt_nfs_path }}/cgroup.conf"
    dest: "{{ slurm_config_dir }}/cgroup.conf"
    owner: "{{ slurm_user }}"
    group: "{{ slurm_group }}"
    mode: '0644'
    remote_src: true
  notify: restart slurmd

- name: Set permissions on slurm config directory
  ansible.builtin.file:
    path: "{{ slurm_config_dir }}"
    owner: "{{ slurm_user }}"
    group: "{{ slurm_group }}"
    recurse: true

# Start slurmd via whichever supervisor this host advertised (systemd on VMs,
# pm2-go on container nodes). Run with -D so the daemon stays in the
# foreground when supervised by pm2; systemd ignores the flag.
- name: Start slurmd
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/_supervisor.yml"
  vars:
    svc_name: slurmd
    svc_cmd: "/usr/sbin/slurmd -D -f {{ slurm_config_dir }}/slurm.conf"
    svc_state: started
