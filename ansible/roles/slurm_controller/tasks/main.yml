---
- name: Install Slurm controller packages
  ansible.builtin.apt:
    name:
      - slurmctld
      - slurmdbd
      - slurm-client
      # slurmd lives here too — single-VM bootstraps register the controller
      # itself as a node, and on real clusters the controller often runs jobs
      # as well, so installing slurmd unconditionally makes the placeholder
      # node usable out of the box.
      - slurmd
      - munge
      - libmunge-dev
    state: present
    update_cache: true

- name: Install MySQL and Python MySQL binding
  ansible.builtin.apt:
    name:
      - mysql-server
      - python3-mysqldb
    state: present
    update_cache: true
  # Only needed when slurmdbd accounting is enabled. Skipping saves install
  # time and avoids the mysql.service failure on systems where the package
  # ships in a half-broken state (e.g. apparmor + missing libs on 24.04).
  when: vault_slurmdbd_storage_pass | default('') | length > 0

# MySQL initialization for container nodes (pm2): the apt install puts a
# fresh data dir under /var/lib/mysql, but the systemd unit normally
# completes that init on first boot. Under pm2 nothing does, so mysqld
# won't start. `mysqld --initialize-insecure` populates the system
# tables idempotently — it no-ops on a populated datadir.
- name: Initialise MySQL data directory (pm2 hosts only)
  ansible.builtin.command: mysqld --initialize-insecure --user=mysql
  args:
    creates: /var/lib/mysql/mysql/user.frm
  when:
    - node_supervisor == "pm2"
    - vault_slurmdbd_storage_pass | default('') | length > 0

# Start MySQL via whichever supervisor this host runs under. On systemd
# we keep the rescue/diagnostics block (mysql failures are the #1 source
# of broken-bootstrap reports). pm2 just runs mysqld in the foreground;
# its logs land under /var/log/aura/pm2/mysql.{out,err}.log and surface
# in the per-node Logs dialog with no extra glue.
- name: Enable and start MySQL (with failure diagnostics)
  when: vault_slurmdbd_storage_pass | default('') | length > 0
  block:
    - name: Start MySQL
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/_supervisor.yml"
      vars:
        svc_name: mysql
        svc_cmd: "/usr/sbin/mysqld --user=mysql"
        svc_state: started
  rescue:
    - name: Capture mysql systemctl status
      ansible.builtin.command: systemctl status mysql.service --no-pager -l
      register: mysql_status
      changed_when: false
      failed_when: false
      when: node_supervisor == "systemd"
    - name: Capture mysql journalctl (last 200 lines)
      ansible.builtin.command: journalctl -u mysql.service --no-pager -n 200
      register: mysql_journal
      changed_when: false
      failed_when: false
      when: node_supervisor == "systemd"
    - name: Capture mysql pm2 logs (last 200 lines)
      ansible.builtin.command: /usr/local/bin/pm2 logs mysql --nostream --lines 200
      register: mysql_pm2_logs
      changed_when: false
      failed_when: false
      when: node_supervisor == "pm2"
    - name: Capture mysqld error log tail (if present)
      ansible.builtin.shell: |
        set +e
        for f in /var/log/mysql/error.log /var/log/mysqld.log /var/log/mysql/mysql.err /var/log/aura/pm2/mysql.err.log; do
          if [ -f "$f" ]; then echo "---- $f ----"; tail -n 200 "$f"; fi
        done
      register: mysql_errlog
      changed_when: false
      failed_when: false
    - name: Print mysql failure diagnostics
      ansible.builtin.debug:
        msg: |
          mysql failed to start — diagnostics:

          == systemctl status ==
          {{ mysql_status.stdout | default('(skipped — pm2 host)') }}
          {{ mysql_status.stderr | default('') }}

          == journalctl -u mysql.service (last 200) ==
          {{ mysql_journal.stdout | default('(skipped — pm2 host)') }}
          {{ mysql_journal.stderr | default('') }}

          == pm2 logs mysql (last 200) ==
          {{ mysql_pm2_logs.stdout | default('(skipped — systemd host)') }}
          {{ mysql_pm2_logs.stderr | default('') }}

          == mysqld error logs ==
          {{ mysql_errlog.stdout | default('(none)') }}
    - name: Re-fail the play so the caller sees bootstrap as failed
      ansible.builtin.fail:
        msg: "mysql failed to start — see diagnostics above."

- name: Create slurm accounting database
  community.mysql.mysql_db:
    name: "{{ slurmdbd_storage_db }}"
    state: present
    login_unix_socket: /var/run/mysqld/mysqld.sock
  when: vault_slurmdbd_storage_pass | default('') | length > 0

- name: Create slurm MySQL user
  community.mysql.mysql_user:
    name: "{{ slurmdbd_storage_user }}"
    password: "{{ slurmdbd_storage_pass | default(vault_slurmdbd_storage_pass) }}"
    priv: "{{ slurmdbd_storage_db }}.*:ALL"
    host: localhost
    state: present
    login_unix_socket: /var/run/mysqld/mysqld.sock
  when: vault_slurmdbd_storage_pass | default('') | length > 0

- name: Create slurm directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ slurm_user }}"
    group: "{{ slurm_group }}"
    mode: '0755'
  loop:
    - "{{ slurm_config_dir }}"
    - "{{ slurm_log_dir }}"
    - "{{ slurm_spool_dir }}/slurmctld"

- name: Write slurm.conf
  ansible.builtin.template:
    src: slurm.conf.j2
    dest: "{{ slurm_config_dir }}/slurm.conf"
    owner: "{{ slurm_user }}"
    group: "{{ slurm_group }}"
    mode: '0644'
  notify: restart slurmctld

- name: Copy slurm.conf to mgmt FS
  ansible.builtin.copy:
    src: "{{ slurm_config_dir }}/slurm.conf"
    dest: "{{ mgmt_nfs_path }}/slurm.conf"
    owner: "{{ slurm_user }}"
    group: "{{ slurm_group }}"
    mode: '0644'
    remote_src: true

- name: Write slurmdbd.conf
  ansible.builtin.template:
    src: slurmdbd.conf.j2
    dest: "{{ slurm_config_dir }}/slurmdbd.conf"
    owner: "{{ slurm_user }}"
    group: "{{ slurm_group }}"
    mode: '0600'
  when: vault_slurmdbd_storage_pass | default('') | length > 0
  notify: restart slurmdbd

- name: Remove stale slurmdbd.conf when accounting disabled
  ansible.builtin.file:
    path: "{{ slurm_config_dir }}/slurmdbd.conf"
    state: absent
  when: vault_slurmdbd_storage_pass | default('') | length == 0

- name: Write cgroup.conf
  ansible.builtin.template:
    src: cgroup.conf.j2
    dest: "{{ slurm_config_dir }}/cgroup.conf"
    owner: "{{ slurm_user }}"
    group: "{{ slurm_group }}"
    mode: '0644'
  notify: restart slurmctld

- name: Copy cgroup.conf to mgmt FS
  ansible.builtin.copy:
    src: "{{ slurm_config_dir }}/cgroup.conf"
    dest: "{{ mgmt_nfs_path }}/cgroup.conf"
    owner: "{{ slurm_user }}"
    group: "{{ slurm_group }}"
    mode: '0644'
    remote_src: true

# Glob the real GPU device nodes instead of assuming /dev/nvidia[0-(N-1)]:
# containers (RunPod pods etc.) get the GPU with its *host* minor number
# (e.g. /dev/nvidia8 and no /dev/nvidia0), and a gres.conf File= pointing
# at a missing device makes slurmd crash-loop ("can't stat gres.conf
# file"). The template uses the discovered list, falling back to a
# Count-only line when no device nodes exist at all.
- name: Probe NVIDIA device nodes (gres File= support)
  ansible.builtin.shell: ls /dev/nvidia[0-9]* 2>/dev/null | sort -V || true
  register: _aura_nvidia_devs
  changed_when: false

- name: Write gres.conf (GPU nodes only)
  ansible.builtin.template:
    src: gres.conf.j2
    dest: "{{ slurm_config_dir }}/gres.conf"
    owner: "{{ slurm_user }}"
    group: "{{ slurm_group }}"
    mode: '0644'
  # Guard against entries that lack `gpus` (e.g. stub rows from Edit-node)
  # so selectattr doesn't blow up before the gt comparison.
  when: (slurm_nodes | selectattr('gpus', 'defined') | selectattr('gpus', 'gt', 0) | list | length) > 0
  notify: restart slurmctld

- name: Copy gres.conf to mgmt FS (GPU nodes only)
  ansible.builtin.copy:
    src: "{{ slurm_config_dir }}/gres.conf"
    dest: "{{ mgmt_nfs_path }}/gres.conf"
    owner: "{{ slurm_user }}"
    group: "{{ slurm_group }}"
    mode: '0644'
    remote_src: true
  when: (slurm_nodes | selectattr('gpus', 'defined') | selectattr('gpus', 'gt', 0) | list | length) > 0

- name: Set permissions on slurm config directory
  ansible.builtin.file:
    path: "{{ slurm_config_dir }}"
    owner: "{{ slurm_user }}"
    group: "{{ slurm_group }}"
    recurse: true

- name: Start slurmdbd
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/_supervisor.yml"
  vars:
    svc_name: slurmdbd
    svc_cmd: "/usr/sbin/slurmdbd -D -v"
    svc_state: started
  when: vault_slurmdbd_storage_pass | default('') | length > 0

# When accounting is disabled we try to stop slurmdbd, but on a clean
# host it may not be installed at all — the service: module errors out
# in that case. Ansible doesn't allow `failed_when` on include_tasks,
# so we wrap in a block+rescue to swallow that path.
- name: Stop slurmdbd when accounting disabled
  when: vault_slurmdbd_storage_pass | default('') | length == 0
  block:
    - name: Stop slurmdbd (best-effort)
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/_supervisor.yml"
      vars:
        svc_name: slurmdbd
        svc_cmd: "/usr/sbin/slurmdbd -D -v"
        svc_state: stopped
  rescue:
    - name: slurmdbd stop skipped
      ansible.builtin.debug:
        msg: "slurmdbd stop was a no-op (not installed or not registered) — accounting disabled."

- name: Start slurmctld
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/_supervisor.yml"
  vars:
    svc_name: slurmctld
    svc_cmd: "/usr/sbin/slurmctld -D -f {{ slurm_config_dir }}/slurm.conf"
    svc_state: started

- name: Start slurmd on controller
  # The controller doubles as a worker in single-VM bootstraps and is also
  # used as a compute host on smaller real clusters. Either way, slurmd needs
  # to be running for jobs to actually execute on this box.
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/_supervisor.yml"
  vars:
    svc_name: slurmd
    svc_cmd: "/usr/sbin/slurmd -D -f {{ slurm_config_dir }}/slurm.conf"
    svc_state: started
