---
- name: Install Slurm controller packages
  ansible.builtin.apt:
    name:
      - slurmctld
      - slurmdbd
      - slurm-client
      # slurmd lives here too — single-VM bootstraps register the controller
      # itself as a node, and on real clusters the controller often runs jobs
      # as well, so installing slurmd unconditionally makes the placeholder
      # node usable out of the box.
      - slurmd
      - munge
      - libmunge-dev
    state: present
    update_cache: true

- name: Install MySQL and Python MySQL binding
  ansible.builtin.apt:
    name:
      - mysql-server
      - python3-mysqldb
    state: present
    update_cache: true
  # Only needed when slurmdbd accounting is enabled. Skipping saves install
  # time and avoids the mysql.service failure on systems where the package
  # ships in a half-broken state (e.g. apparmor + missing libs on 24.04).
  when: vault_slurmdbd_storage_pass | default('') | length > 0

# Start MySQL inside a block so that if systemd refuses to bring the unit
# up we can surface the actual error (journalctl + systemctl status +
# mysqld error log) in the ansible log. Without this the caller only sees
# systemd's generic "Job for mysql.service failed … see journalctl" line,
# which is useless over SSH in our bootstrap UI.
- name: Enable and start MySQL (with failure diagnostics)
  when: vault_slurmdbd_storage_pass | default('') | length > 0
  block:
    - name: Enable and start MySQL
      ansible.builtin.service:
        name: mysql
        state: started
        enabled: true
  rescue:
    - name: Capture mysql systemctl status
      ansible.builtin.command: systemctl status mysql.service --no-pager -l
      register: mysql_status
      changed_when: false
      failed_when: false
    - name: Capture mysql journalctl (last 200 lines)
      ansible.builtin.command: journalctl -u mysql.service --no-pager -n 200
      register: mysql_journal
      changed_when: false
      failed_when: false
    - name: Capture mysqld error log tail (if present)
      ansible.builtin.shell: |
        set +e
        for f in /var/log/mysql/error.log /var/log/mysqld.log /var/log/mysql/mysql.err; do
          if [ -f "$f" ]; then echo "---- $f ----"; tail -n 200 "$f"; fi
        done
      register: mysql_errlog
      changed_when: false
      failed_when: false
    - name: Print mysql failure diagnostics
      ansible.builtin.debug:
        msg: |
          mysql.service failed to start — diagnostics:

          == systemctl status ==
          {{ mysql_status.stdout | default('(no output)') }}
          {{ mysql_status.stderr | default('') }}

          == journalctl -u mysql.service (last 200) ==
          {{ mysql_journal.stdout | default('(no output)') }}
          {{ mysql_journal.stderr | default('') }}

          == mysqld error logs ==
          {{ mysql_errlog.stdout | default('(none)') }}
    - name: Re-fail the play so the caller sees bootstrap as failed
      ansible.builtin.fail:
        msg: "mysql.service failed to start — see diagnostics above."

- name: Create slurm accounting database
  community.mysql.mysql_db:
    name: "{{ slurmdbd_storage_db }}"
    state: present
    login_unix_socket: /var/run/mysqld/mysqld.sock
  when: vault_slurmdbd_storage_pass | default('') | length > 0

- name: Create slurm MySQL user
  community.mysql.mysql_user:
    name: "{{ slurmdbd_storage_user }}"
    password: "{{ slurmdbd_storage_pass | default(vault_slurmdbd_storage_pass) }}"
    priv: "{{ slurmdbd_storage_db }}.*:ALL"
    host: localhost
    state: present
    login_unix_socket: /var/run/mysqld/mysqld.sock
  when: vault_slurmdbd_storage_pass | default('') | length > 0

- name: Create slurm directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ slurm_user }}"
    group: "{{ slurm_group }}"
    mode: '0755'
  loop:
    - "{{ slurm_config_dir }}"
    - "{{ slurm_log_dir }}"
    - "{{ slurm_spool_dir }}/slurmctld"

- name: Write slurm.conf
  ansible.builtin.template:
    src: slurm.conf.j2
    dest: "{{ slurm_config_dir }}/slurm.conf"
    owner: "{{ slurm_user }}"
    group: "{{ slurm_group }}"
    mode: '0644'
  notify: restart slurmctld

- name: Copy slurm.conf to mgmt FS
  ansible.builtin.copy:
    src: "{{ slurm_config_dir }}/slurm.conf"
    dest: "{{ mgmt_nfs_path }}/slurm.conf"
    owner: "{{ slurm_user }}"
    group: "{{ slurm_group }}"
    mode: '0644'
    remote_src: true

- name: Write slurmdbd.conf
  ansible.builtin.template:
    src: slurmdbd.conf.j2
    dest: "{{ slurm_config_dir }}/slurmdbd.conf"
    owner: "{{ slurm_user }}"
    group: "{{ slurm_group }}"
    mode: '0600'
  when: vault_slurmdbd_storage_pass | default('') | length > 0
  notify: restart slurmdbd

- name: Remove stale slurmdbd.conf when accounting disabled
  ansible.builtin.file:
    path: "{{ slurm_config_dir }}/slurmdbd.conf"
    state: absent
  when: vault_slurmdbd_storage_pass | default('') | length == 0

- name: Write cgroup.conf
  ansible.builtin.template:
    src: cgroup.conf.j2
    dest: "{{ slurm_config_dir }}/cgroup.conf"
    owner: "{{ slurm_user }}"
    group: "{{ slurm_group }}"
    mode: '0644'
  notify: restart slurmctld

- name: Copy cgroup.conf to mgmt FS
  ansible.builtin.copy:
    src: "{{ slurm_config_dir }}/cgroup.conf"
    dest: "{{ mgmt_nfs_path }}/cgroup.conf"
    owner: "{{ slurm_user }}"
    group: "{{ slurm_group }}"
    mode: '0644'
    remote_src: true

- name: Write gres.conf (GPU nodes only)
  ansible.builtin.template:
    src: gres.conf.j2
    dest: "{{ slurm_config_dir }}/gres.conf"
    owner: "{{ slurm_user }}"
    group: "{{ slurm_group }}"
    mode: '0644'
  # Guard against entries that lack `gpus` (e.g. stub rows from Edit-node)
  # so selectattr doesn't blow up before the gt comparison.
  when: (slurm_nodes | selectattr('gpus', 'defined') | selectattr('gpus', 'gt', 0) | list | length) > 0
  notify: restart slurmctld

- name: Copy gres.conf to mgmt FS (GPU nodes only)
  ansible.builtin.copy:
    src: "{{ slurm_config_dir }}/gres.conf"
    dest: "{{ mgmt_nfs_path }}/gres.conf"
    owner: "{{ slurm_user }}"
    group: "{{ slurm_group }}"
    mode: '0644'
    remote_src: true
  when: (slurm_nodes | selectattr('gpus', 'defined') | selectattr('gpus', 'gt', 0) | list | length) > 0

- name: Set permissions on slurm config directory
  ansible.builtin.file:
    path: "{{ slurm_config_dir }}"
    owner: "{{ slurm_user }}"
    group: "{{ slurm_group }}"
    recurse: true

- name: Enable and start slurmdbd
  ansible.builtin.service:
    name: slurmdbd
    state: started
    enabled: true
  when: vault_slurmdbd_storage_pass | default('') | length > 0

- name: Stop and disable slurmdbd when accounting disabled
  ansible.builtin.service:
    name: slurmdbd
    state: stopped
    enabled: false
  when: vault_slurmdbd_storage_pass | default('') | length == 0
  failed_when: false

- name: Enable and start slurmctld
  ansible.builtin.service:
    name: slurmctld
    state: started
    enabled: true

- name: Enable and start slurmd
  # The controller doubles as a worker in single-VM bootstraps and is also
  # used as a compute host on smaller real clusters. Either way, slurmd needs
  # to be running for jobs to actually execute on this box.
  ansible.builtin.service:
    name: slurmd
    state: started
    enabled: true
