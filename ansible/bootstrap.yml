---
# Bootstrap a new Slurm cluster from scratch.
# Usage:
#   ansible-playbook -i inventory/hosts.ini -e @cluster-config.json bootstrap.yml
#
# Required vars (via cluster-config.json):
#   slurm_cluster_name, slurm_controller_host, mgmt_nfs_server, data_nfs_server,
#   nfs_allowed_network, freeipa_server, freeipa_domain,
#   aura_agent_nats_url, aura_agent_binary_src,
#   slurm_nodes, slurm_partitions, slurm_hosts_entries,
#   vault_slurmdbd_storage_pass

- name: Bootstrap master node
  hosts: slurm_controllers
  become: true
  roles:
    - common
    - chrony
    - nfs_server
    - munge
    # sssd / FreeIPA are optional — skip the whole role when freeipa_server
    # isn't configured (single-node test clusters typically don't have it).
    - role: sssd
      when: freeipa_server is defined and (freeipa_server | length > 0)
    - hosts_block
    - slurm_controller
    # aura_agent is only needed in NATS mode — skip when no binary source is
    # configured (SSH-mode clusters don't need the agent at all).
    - role: aura_agent
      when: aura_agent_binary_src is defined and (aura_agent_binary_src | length > 0)

- name: Bootstrap worker nodes
  hosts: slurm_workers
  become: true
  roles:
    - common
    - chrony
    - nfs_client
    - munge
    - role: sssd
      when: freeipa_server is defined and (freeipa_server | length > 0)
    - hosts_block
    - slurm_worker
