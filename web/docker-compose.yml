version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://aura:aura@postgres:5432/aura?schema=public&connection_limit=15&pool_timeout=30
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - KEYCLOAK_ID=${KEYCLOAK_ID}
      - KEYCLOAK_SECRET=${KEYCLOAK_SECRET}
      - KEYCLOAK_ISSUER=${KEYCLOAK_ISSUER}
      - FREEIPA_URL=${FREEIPA_URL}
      - FREEIPA_USER=${FREEIPA_USER}
      - FREEIPA_PASSWORD=${FREEIPA_PASSWORD}
      - ANSIBLE_PLAYBOOKS_DIR=/opt/aura/ansible
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ansible-playbooks:/opt/aura/ansible
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: aura
      POSTGRES_PASSWORD: aura
      POSTGRES_DB: aura
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aura"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Run database migrations on startup
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    command: ["npx", "prisma", "migrate", "deploy"]
    environment:
      - DATABASE_URL=postgresql://aura:aura@postgres:5432/aura?schema=public
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  ansible-playbooks:
