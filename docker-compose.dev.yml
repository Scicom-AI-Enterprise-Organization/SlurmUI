# Local development infrastructure — Postgres, NATS, Keycloak.
# Does NOT start the web or agent (run those from source).
#
#   docker compose -f docker-compose.dev.yml up -d
#
version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: aura
      POSTGRES_PASSWORD: aura
      POSTGRES_DB: aura
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aura"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
      - "8222:8222"   # monitoring UI: http://localhost:8222
    command: ["--jetstream", "--store_dir=/data", "-m", "8222"]
    volumes:
      - natsdata_dev:/data

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - kcdata_dev:/opt/keycloak/data

volumes:
  pgdata_dev:
  natsdata_dev:
  kcdata_dev:
