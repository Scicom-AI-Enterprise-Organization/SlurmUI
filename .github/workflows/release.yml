name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write        # create GitHub releases + upload assets
  id-token: write        # OIDC → AWS ECR

env:
  AWS_REGION: ap-southeast-5
  AWS_ACCOUNT_ID: "865626945255"
  ECR_WEB_REPO: scicom/scicom-aura

jobs:
  # ── 1a. Build web image per platform (native runners) ─────────────────────
  build-web:
    name: Build web (${{ matrix.suffix }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: ${{ matrix.platform }}
          tags: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_WEB_REPO }}:${{ github.ref_name }}-${{ matrix.suffix }}

  # ── 1b. Merge platform images into a multi-arch manifest ──────────────────
  merge-web:
    name: Merge web manifest
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push multi-arch manifest
        run: |
          IMAGE="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_WEB_REPO }}"
          TAG="${{ github.ref_name }}"
          docker buildx imagetools create \
            --tag "${IMAGE}:${TAG}" \
            --tag "${IMAGE}:latest" \
            "${IMAGE}:${TAG}-amd64" \
            "${IMAGE}:${TAG}-arm64"

  # ── 2. Build agent binary → GitHub Release ────────────────────────────────
  build-agent:
    name: Build agent binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum

      - name: Build linux/amd64
        run: |
          cd agent
          GOOS=linux GOARCH=amd64 go build \
            -ldflags "-s -w -X main.Version=${GITHUB_REF_NAME}" \
            -o ../aura-agent-linux-amd64 ./cmd/aura-agent

      - name: Build linux/arm64
        run: |
          cd agent
          GOOS=linux GOARCH=arm64 go build \
            -ldflags "-s -w -X main.Version=${GITHUB_REF_NAME}" \
            -o ../aura-agent-linux-arm64 ./cmd/aura-agent

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            aura-agent-linux-amd64
            aura-agent-linux-arm64
